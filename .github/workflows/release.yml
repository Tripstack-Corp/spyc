# spyc release pipeline — build, sign, and publish on a version tag.
#
# Trigger: pushing a tag matching `v*` (e.g. `v2.0.0-rc.1`, `v2.0.0`,
# `v2.0.1`). `-alpha`/`-beta`/`-rc` tags publish as GitHub *pre-releases*;
# a bare `vN.M.P` publishes as the latest release. The build jobs CALL the
# existing Makefile targets so local `make dist` and CI never drift
# (AGENTS.md; RELEASE_ENGINEERING.md §8).
#
# Artifacts (RELEASE_ENGINEERING.md §9):
#   spyc-<tag>-macos-universal.tar.gz   arm64 + x86_64 lipo
#   spyc-<tag>-linux-x86_64.tar.gz      static, musl
#   spyc-<tag>-linux-aarch64.tar.gz     static, musl
#   SHA256SUMS                          checksums over all three tarballs
#
# Signing is keyless — no stored secrets (RELEASE_ENGINEERING.md §13.8):
#   - GitHub build-provenance attestations   verify: `gh attestation verify <file>`
#   - cosign-signed SHA256SUMS bundle (OIDC)  verify: `cosign verify-blob`
# GPG signing, the Homebrew tap, and cargo-binstall are documented fast-follows.
name: Release

on:
  push:
    tags:
      - "v*"

# Don't cancel an in-flight release if another tag lands; releases are cheap
# to let finish and cancelling mid-publish is worse than a little overlap.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

# Least-privilege default; the publish job widens it (contents/id-token/…).
permissions:
  contents: read

jobs:
  macos:
    name: Build macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (auto from rust-toolchain.toml)
        run: rustc --version && cc --version
      - uses: Swatinem/rust-cache@v2
      - name: Build universal binary
        run: make release-macos-universal
      - name: Package tarball
        run: |
          install -m 0755 dist/spyc-macos-universal spyc
          tar -czf "spyc-${GITHUB_REF_NAME}-macos-universal.tar.gz" spyc LICENSE README.md
      - uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: spyc-*-macos-universal.tar.gz
          if-no-files-found: error

  linux:
    name: Build Linux musl (x86_64 + aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # zig is cargo-zigbuild's cross-linker; the Makefile's musl targets shell
      # out to `cargo zigbuild`. Pin an explicit stable — the unpinned default
      # resolves to an unreleased Zig (0.16.0) that 404s on every mirror.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Toolchain (auto from rust-toolchain.toml)
        run: rustc --version
      - uses: Swatinem/rust-cache@v2
      - name: Build static musl binaries
        run: |
          make release-linux-x86
          make release-linux-arm
      - name: Package tarballs
        run: |
          install -m 0755 target/x86_64-unknown-linux-musl/release/spyc spyc
          tar -czf "spyc-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" spyc LICENSE README.md
          install -m 0755 target/aarch64-unknown-linux-musl/release/spyc spyc
          tar -czf "spyc-${GITHUB_REF_NAME}-linux-aarch64.tar.gz" spyc LICENSE README.md
      - uses: actions/upload-artifact@v7
        with:
          name: linux-musl
          path: spyc-*-linux-*.tar.gz
          if-no-files-found: error

  publish:
    name: Sign + publish release
    needs: [macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
      id-token: write # OIDC for attestations + cosign keyless signing
      attestations: write # build-provenance attestations
      actions: write # dispatch homebrew.yml / apt.yml (below)
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so git-cliff can build the notes for this tag.
          fetch-depth: 0
      - name: Collect build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Stage dist/ + checksums
        run: |
          mkdir -p dist
          find artifacts -name 'spyc-*.tar.gz' -exec cp {} dist/ \;
          cd dist && shasum -a 256 spyc-*.tar.gz > SHA256SUMS
          echo "=== SHA256SUMS ===" && cat SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/spyc-*.tar.gz"
      - name: Install cosign
        # Pinned to an exact tag: sigstore/cosign-installer does NOT publish a
        # moving `v4` major alias (only exact `v4.x.y`), so `@v4` fails to
        # resolve. Dependabot bumps this as new versions ship.
        uses: sigstore/cosign-installer@v4.1.2
      - name: Sign checksums (cosign keyless)
        run: |
          cd dist
          cosign sign-blob --yes SHA256SUMS --bundle SHA256SUMS.cosign.bundle
      - name: Generate release notes (git-cliff, this tag's section)
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - run: git cliff --config cliff.toml --latest --strip header > RELEASE_NOTES.md
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=()
          case "${GITHUB_REF_NAME}" in
            *-alpha*|*-beta*|*-rc*) args+=(--prerelease) ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            --title "spyc ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            "${args[@]}" \
            dist/spyc-*.tar.gz \
            dist/SHA256SUMS \
            dist/SHA256SUMS.cosign.bundle
      - name: Bump downstream channels (homebrew tap + apt)
        # A release created with GITHUB_TOKEN does NOT fire `on: release`
        # workflows (GitHub blocks token events from cascading), so dispatch
        # homebrew.yml / apt.yml explicitly — `workflow_dispatch` is the one
        # event GITHUB_TOKEN can trigger. Runs after the release above so both
        # can download its assets. (Their `on: release` triggers still cover a
        # manual/UI publish.)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run homebrew.yml -f tag="${GITHUB_REF_NAME}"
          gh workflow run apt.yml      -f tag="${GITHUB_REF_NAME}"
      - name: Prune old RC pre-releases (keep newest 3)
        # RC pre-releases each carry ~38 MB of assets and pile up on the tags
        # page. Keep only the 3 most recent `*-rc*` pre-releases; delete older
        # ones together with their git tags (`--cleanup-tag`), which also removes
        # their assets. Stable releases (isPrerelease=false) and non-rc tags are
        # never selected — final `vX.Y.Z` releases and `v1.50.0` are untouched.
        # Runs last, so the tag just published is always among the kept 3.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t old < <(gh release list --limit 100 \
            --json tagName,isPrerelease,createdAt \
            --jq 'map(select(.isPrerelease and (.tagName|test("-rc"))))
                  | sort_by(.createdAt) | reverse | .[3:] | .[].tagName')
          for tag in "${old[@]}"; do
            echo "pruning old RC release + tag: $tag"
            gh release delete "$tag" --cleanup-tag --yes
          done

  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Independent of the GitHub release (only needs the tag's source + the
    # token), so a crates.io hiccup never blocks shipping the binaries. Skips
    # cleanly when CARGO_REGISTRY_TOKEN is unset (forks) and is idempotent — a
    # re-run of an already-published version is a no-op, not a failure. rc/beta
    # tags publish too: crates.io keeps prereleases out of the default
    # `cargo install` resolution, so they can't poison the stable channel.
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain (auto from rust-toolchain.toml)
        run: rustc --version && cargo --version
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN unset — skipping crates.io publish."
            exit 0
          fi
          ver="${GITHUB_REF_NAME#v}"
          if curl -sf -H "User-Agent: spyc-release" \
               "https://crates.io/api/v1/crates/spyc/${ver}" >/dev/null; then
            echo "spyc ${ver} is already on crates.io — nothing to do."
            exit 0
          fi
          cargo publish --locked
