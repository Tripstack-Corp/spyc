# spyc configuration — generated by `spyc --print-config`.
#
# Copy to either of:
#   ~/.spycrc.toml            (per-user defaults)
#   <project>/.spycrc.toml    (per-project overrides; win over user)
#
# Both files are watched at runtime — edits take effect without restart.
# Every option below is at its default; uncomment what you want to change.

# ── layout ────────────────────────────────────────────────────────────
# Where the status bar lives. "top" (default) is stock spyc; "bottom"
# matches vim/tmux convention and is convenient when running spyc inside
# tmux (the host status line owns the top row).
#
# With "bottom", the prompt sits one row above the status bar (vim-style
# cmdline-above-statusline ordering).
#
# chord_hint_delay_ms: how long to hold a chord prefix (e.g. `g`, `^a`, `H`)
# before the which-key popup lists its continuations. Default 300. Set to 0
# to disable the popup entirely.
[layout]
# status_position = "top"
# chord_hint_delay_ms = 300

# ── pane ──────────────────────────────────────────────────────────────
# Default command pre-filled into the `^a c` (new pane tab) prompt.
# Falls back to "claude" if unset. The $SPYC_PANE_CMD env var still
# overrides this value, so per-shell experimentation keeps working.
#
# `new_tab_cwd` (default "project_home"): the working directory a new
# pane tab opens in. "project_home" anchors new panes to the sticky
# session project root (so a pane lands at the project no matter where
# the file list has wandered); "browse_dir" opens "here" — the focused
# column's current directory. Falls back to the browse dir when
# "project_home" is set but no PROJECT_HOME exists.
#
# `claude_transcript_scrollback` (default false): when true, `^a v` on
# a Claude pane reads Claude's on-disk conversation JSONL and renders
# the structured transcript instead of the default terminal-scrollback
# capture. (codex always uses its transcript — terminal capture can't
# see codex history — so this toggle only affects Claude.) Both work
# for Claude; the transcript view is cleaner (no grid/repaint
# artifacts), the terminal capture is verbatim.
#
# `agy_transcript_scrollback` (default true): same as above, but for
# Antigravity (`agy`) panes. Reads from `history.jsonl` and renders
# cleanly without terminal artifacts.
[pane]
# default_command = "claude"
# new_tab_cwd = "project_home"
# claude_transcript_scrollback = false
# agy_transcript_scrollback = true
# codex_mcp = true
#   Set false to stop registering spyc's MCP server for codex panes (the
#   [mcp_servers.spyc] entry in .codex/config.toml). Workaround for codex's
#   /review hang (openai/codex#25856): codex mis-resolves the MCP tool-call
#   approval elicitation and spins forever. Status hooks still install, so
#   activity dots keep working — codex just loses spyc's MCP tools. Claude
#   is unaffected.

# ── yank ──────────────────────────────────────────────────────────────
# Pager yank (`y` / `Y` / visual-mode `y`) behavior.
# `include_pager_title` (default true) prepends a short header to the
# yanked text identifying the source — the pager's title, e.g.
# `!cargo build`, `task #3: cargo test`, or the filename. Useful when
# pasting captured output into chat / notes so the "what was running"
# context goes with it. Set to false to yank just the content.
[yank]
# include_pager_title = true

# ── pager ─────────────────────────────────────────────────────────────
# In-app pager / viewer (including the `^a v` pane scrollback).
# `tab_width` (default 4) is how many columns a tab character expands
# to. `w` reveals each expanded tab with a `→` marker; with `w` off the
# tab is plain indentation. Minimum 1 (a 0 is clamped — a zero-width
# tab would vanish).
[pager]
# tab_width = 4

# ── markdown ──────────────────────────────────────────────────────────
# Default view for `.md` / `.markdown` files in the pager.
# `open_as_rendered` (default true) opens them in the rendered view;
# `m` toggles to source. Set to false to open in source view by
# default (still `m`-toggleable). Either way, per-side scroll memory
# preserves your reading position across toggles.
[markdown]
# open_as_rendered = true

# ── delete ────────────────────────────────────────────────────────────
# Behavior of the `R` and `dd` / `Ndd` removal actions.
# `confirm` (default true) shows a `y/N` prompt with a warning-color
# highlight on the targeted rows before anything happens. Set to
# false for "yolo mode" — deletions fire immediately, no prompt, no
# highlight. The graveyard (`gy`) is still the destination either
# way, so accidental yolo deletions are still recoverable.
[delete]
# confirm = true

# ── notify ────────────────────────────────────────────────────────────
# Notifications when an agent pane changes status (P3-1 "which agent needs
# me"). Fires on the transition itself (0 delay), not a timer.
#   desktop      (default true)  notify when an agent goes Blocked.
#   desktop_via  (default "auto") how to deliver it:
#                  "auto"   — OSC-9 escape over SSH (pops on your *client*
#                             terminal), the OS notifier locally.
#                  "system" — OS notifier only (notify-rust; the machine spyc
#                             RUNS on, so the remote host over SSH).
#                  "osc9"   — terminal escape only (your client; needs a
#                             terminal that supports OSC 9 — iTerm2/kitty/WezTerm).
#                  "both"   — fire both.
#   desktop_done (default true)  also notify on Done (a finished turn); set
#                                false to be pinged only when *blocked*.
#   bell         (default false) also ring the terminal bell (BEL).
#   visual       (default false) flash a Charm-style gradient border pulse.
#   suppress_focused_tab (default true)  stay quiet when the transitioning
#                                tab is the one you're already watching.
[notify]
# desktop = true
# desktop_via = "auto"
# desktop_done = true
# bell = false
# visual = false
# suppress_focused_tab = true

# ── colors ────────────────────────────────────────────────────────────
# Hex strings ("#aabbcc") or named colors ("red", "blue"). Anything you
# don't set falls back to the built-in palette.
[colors]
# dir            = "#82aaff"
# exec           = "#c3e88d"
# symlink        = "#89ddff"
# file           = "#cccccc"
# other          = "#888888"
# cursor_bg      = "#ff9e64"
# cursor_fg      = "#1a1b26"
# pick           = "#ffcb6b"
# take           = "#c792ea"
# status_user    = "#bb9af7"
# status_path    = "#7dcfff"
# status_suffix  = "#565f89"
# prompt_prefix  = "#ff9e64"
# popup_border   = "#bb9af7"  # outline of centered pop-ups (which-key, harpoon)
# Diff / show / blame renderer (the in-house syntax-highlighted view).
# *_fg are foregrounds; *_bg are the row-background tints behind +/- lines
# (dropped in mono / colortoggle). Syntax-highlighted code keeps its own
# colors — only the row background is tinted.
# diff_add_fg    = "#9ece6a"
# diff_del_fg    = "#f7768e"
# diff_add_bg      = "#122619"  # dim line wash
# diff_del_bg      = "#2a161b"
# diff_add_word_bg = "#2b603a"  # brighter, marks the changed tokens
# diff_del_word_bg = "#6b2733"
# diff_hunk_fg   = "#7dcfff"
# diff_file_fg   = "#7aa2f7"
# diff_meta_fg   = "#565f89"

# ── ignore masks ──────────────────────────────────────────────────────
# Defining any mask here REPLACES the built-ins wholesale. Group 1 is
# toggled with `a`, group 2 with `o`. Patterns are globs matched against
# the filename. `enabled = true` makes the mask hide files at startup.
#
# [[ignore_masks]]
# group = 1
# enabled = true
# patterns = [".*"]
#
# [[ignore_masks]]
# group = 2
# enabled = true
# patterns = ["*.o", "target/", "node_modules/", "*.pyc"]

# ── keymap ────────────────────────────────────────────────────────────
# One DSL line per entry. Forms:
#   map <KEY> unix <command...>     — run shell command (% = selection)
#   map <KEY> command <:cmd...>     — run a : command (e.g. graveyard)
#   map <KEY> lua <name>            — run ~/.config/spyc/lua/<name>.lua
#   map <KEY> patternpick <glob>    — pick files matching a glob
#   map <KEY> jump <path>           — jump to a directory
#
# <KEY> can be a single char (`f`), a chord (`g x`), or a Ctrl-prefixed
# binding (`^P`). Lines starting with `#` inside the array are comments.
#
# NOTE: `unix`, `command`, `lua`, and `jump` only take effect in THIS file
# (~/.spycrc.toml) — a project-local .spycrc.toml can't bind them (they could
# run arbitrary code on a single keypress in an untrusted clone). Lua scripts
# load only from ~/.config/spyc/lua/; the engine runs them off-thread with an
# instruction-budget + ceiling kill switch, and `:lua off` / `--no-lua` disable
# it entirely.
#
# For a richer setup, write ~/.config/spyc/init.lua: it can `spyc.map("z", fn)`
# to bind a key to a Lua callback and `spyc.command("blame", fn)` to register a
# runtime `:` command (both fire the callback later). `:lua reload` re-runs it.
#
# Some less-frequent features ship as `:` commands without a default key, so
# the keymap stays uncluttered — bind the ones you use here. Examples:
#
# Keys are single chars (`f`), Ctrl-combos (`^P`), or named keys (`<F2>`) —
# the DSL doesn't bind multi-key chords like `g y`, so re-key the keyless
# features to a free single key or Ctrl-combo.
#
# keymap = [
#   "map f unix file %",
#   "map ^P unix ps aux",
#   "map H patternpick *.hpp",
#   "map A command activity",      # toggle the activity monitor
#   "map L command longlist",      # long ls -lh listing
#   "map ^Y command graveyard",    # recover soft-deleted files
#   "map z lua mymacro",           # run ~/.config/spyc/lua/mymacro.lua
# ]
