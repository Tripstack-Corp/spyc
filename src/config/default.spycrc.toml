# spyc configuration — generated by `spyc --print-config`.
#
# Copy to either of:
#   ~/.spycrc.toml            (per-user defaults)
#   <project>/.spycrc.toml    (per-project overrides; win over user)
#
# Both files are watched at runtime — edits take effect without restart.
# Every option below is at its default; uncomment what you want to change.

# ── layout ────────────────────────────────────────────────────────────
# Where the status bar lives. "top" (default) is stock spyc; "bottom"
# matches vim/tmux convention and is convenient when running spyc inside
# tmux (the host status line owns the top row).
#
# With "bottom", the prompt sits one row above the status bar (vim-style
# cmdline-above-statusline ordering).
[layout]
# status_position = "top"

# ── pane ──────────────────────────────────────────────────────────────
# Default command pre-filled into the `^a c` (new pane tab) prompt.
# Falls back to "claude" if unset. The $SPYC_PANE_CMD env var still
# overrides this value, so per-shell experimentation keeps working.
[pane]
# default_command = "claude"

# ── yank ──────────────────────────────────────────────────────────────
# Pager yank (`y` / `Y` / visual-mode `y`) behavior.
# `include_pager_title` (default true) prepends a short header to the
# yanked text identifying the source — the pager's title, e.g.
# `!cargo build`, `task #3: cargo test`, or the filename. Useful when
# pasting captured output into chat / notes so the "what was running"
# context goes with it. Set to false to yank just the content.
[yank]
# include_pager_title = true

# ── markdown ──────────────────────────────────────────────────────────
# Default view for `.md` / `.markdown` files in the pager.
# `open_as_rendered` (default true) opens them in the rendered view;
# `m` toggles to source. Set to false to open in source view by
# default (still `m`-toggleable). Either way, per-side scroll memory
# preserves your reading position across toggles.
[markdown]
# open_as_rendered = true

# ── delete ────────────────────────────────────────────────────────────
# Behavior of the `R` and `dd` / `Ndd` removal actions.
# `confirm` (default true) shows a `y/N` prompt with a warning-color
# highlight on the targeted rows before anything happens. Set to
# false for "yolo mode" — deletions fire immediately, no prompt, no
# highlight. The graveyard (`gy`) is still the destination either
# way, so accidental yolo deletions are still recoverable.
[delete]
# confirm = true

# ── colors ────────────────────────────────────────────────────────────
# Hex strings ("#aabbcc") or named colors ("red", "blue"). Anything you
# don't set falls back to the built-in palette.
[colors]
# dir            = "#82aaff"
# exec           = "#c3e88d"
# symlink        = "#89ddff"
# file           = "#cccccc"
# other          = "#888888"
# cursor_bg      = "#ff9e64"
# cursor_fg      = "#1a1b26"
# pick           = "#ffcb6b"
# take           = "#c792ea"
# status_user    = "#bb9af7"
# status_path    = "#7dcfff"
# status_suffix  = "#565f89"
# prompt_prefix  = "#ff9e64"

# ── ignore masks ──────────────────────────────────────────────────────
# Defining any mask here REPLACES the built-ins wholesale. Group 1 is
# toggled with `a`, group 2 with `o`. Patterns are globs matched against
# the filename. `enabled = true` makes the mask hide files at startup.
#
# [[ignore_masks]]
# group = 1
# enabled = true
# patterns = [".*"]
#
# [[ignore_masks]]
# group = 2
# enabled = true
# patterns = ["*.o", "target/", "node_modules/", "*.pyc"]

# ── keymap ────────────────────────────────────────────────────────────
# One DSL line per entry. Three forms:
#   map <KEY> unix <command...>     — run shell command (% = selection)
#   map <KEY> patternpick <glob>    — pick files matching a glob
#   map <KEY> jump <path>           — jump to a directory
#
# <KEY> can be a single char (`f`), a chord (`g x`), or a Ctrl-prefixed
# binding (`^P`). Lines starting with `#` inside the array are comments.
#
# keymap = [
#   "map f unix file %",
#   "map ^P unix ps aux",
#   "map gh jump ~",
#   "map H patternpick *.hpp",
# ]
