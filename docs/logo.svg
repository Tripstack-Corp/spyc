<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Anthropic-inspired warm gradient -->
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
    </linearGradient>
    <!-- Cool accent for the eye/AI element -->
    <linearGradient id="coolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background: rounded terminal window -->
  <rect x="32" y="32" width="448" height="448" rx="40" ry="40"
        fill="#1a1b26" />

  <!-- Terminal title bar -->
  <rect x="32" y="32" width="448" height="48" rx="40" ry="40"
        fill="#24283b" />
  <rect x="32" y="56" width="448" height="24"
        fill="#24283b" />

  <!-- Traffic light dots -->
  <circle cx="72" cy="56" r="8" fill="#ff5f57" />
  <circle cx="96" cy="56" r="8" fill="#febc2e" />
  <circle cx="120" cy="56" r="8" fill="#28c840" />

  <!-- Divider line (the split pane) -->
  <line x1="56" y1="296" x2="456" y2="296"
        stroke="#B45309" stroke-width="3" stroke-dasharray="8,4" />

  <!-- Top pane: file list lines (the spy/file manager) -->
  <g opacity="0.5">
    <rect x="72" y="100" width="12" height="12" rx="2" fill="#7aa2f7" />
    <rect x="92" y="102" width="100" height="8" rx="2" fill="#565f89" />

    <rect x="72" y="124" width="12" height="12" rx="2" fill="#7aa2f7" />
    <rect x="92" y="126" width="80" height="8" rx="2" fill="#565f89" />

    <rect x="72" y="148" width="12" height="12" rx="2" fill="#9ece6a" />
    <rect x="92" y="150" width="120" height="8" rx="2" fill="#565f89" />
  </g>

  <!-- Cursor bar highlight -->
  <rect x="60" y="172" width="200" height="16" rx="3"
        fill="#B45309" opacity="0.9" />
  <rect x="72" y="174" width="12" height="12" rx="2" fill="#fff" />
  <rect x="92" y="176" width="90" height="8" rx="2" fill="#fff" />

  <g opacity="0.5">
    <rect x="72" y="200" width="12" height="12" rx="2" fill="#bb9af7" />
    <rect x="92" y="202" width="70" height="8" rx="2" fill="#565f89" />

    <rect x="72" y="224" width="12" height="12" rx="2" fill="#c0caf5" />
    <rect x="92" y="226" width="110" height="8" rx="2" fill="#565f89" />

    <rect x="72" y="248" width="12" height="12" rx="2" fill="#c0caf5" />
    <rect x="92" y="250" width="60" height="8" rx="2" fill="#565f89" />
  </g>

  <!-- Bottom pane: the Anthropic starburst / AI eye -->
  <!-- Outer glow ring -->
  <circle cx="256" cy="388" r="72"
          fill="none" stroke="url(#warmGrad)" stroke-width="3" opacity="0.3" />

  <!-- Anthropic-inspired starburst rays -->
  <g transform="translate(256,388)" opacity="0.6">
    <line x1="0" y1="-52" x2="0" y2="-36" stroke="#D97706" stroke-width="3" stroke-linecap="round" />
    <line x1="36" y1="-36" x2="25" y2="-25" stroke="#D97706" stroke-width="3" stroke-linecap="round" />
    <line x1="52" y1="0" x2="36" y2="0" stroke="#D97706" stroke-width="3" stroke-linecap="round" />
    <line x1="36" y1="36" x2="25" y2="25" stroke="#D97706" stroke-width="3" stroke-linecap="round" />
    <line x1="0" y1="52" x2="0" y2="36" stroke="#D97706" stroke-width="3" stroke-linecap="round" />
    <line x1="-36" y1="36" x2="-25" y2="25" stroke="#D97706" stroke-width="3" stroke-linecap="round" />
    <line x1="-52" y1="0" x2="-36" y2="0" stroke="#D97706" stroke-width="3" stroke-linecap="round" />
    <line x1="-36" y1="-36" x2="-25" y2="-25" stroke="#D97706" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Eye shape (almond) — the "spy" -->
  <path d="M 196 388 Q 256 340 316 388 Q 256 436 196 388 Z"
        fill="url(#coolGrad)" opacity="0.9" />

  <!-- Iris -->
  <circle cx="256" cy="388" r="22" fill="#1a1b26" />

  <!-- Pupil — bright point (the AI spark) -->
  <circle cx="256" cy="388" r="10" fill="url(#warmGrad)" />

  <!-- Catchlight -->
  <circle cx="250" cy="382" r="4" fill="#fff" opacity="0.8" />

  <!-- >_ prompt cursor in the eye (code + AI fusion) -->
  <g transform="translate(256,388)" opacity="0.9">
    <text x="-8" y="5" font-family="monospace" font-size="14" font-weight="bold"
          fill="#fff" text-anchor="middle">_</text>
  </g>

  <!-- "cspy" wordmark below -->
  <text x="256" y="478" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="36" font-weight="700" fill="#c0caf5" text-anchor="middle"
        letter-spacing="8">cspy</text>
</svg>
