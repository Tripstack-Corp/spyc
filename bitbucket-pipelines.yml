# cspy CI — runs formatting, clippy, and tests on every push.
#
# We build against the pinned rust-toolchain.toml so that a new stable Rust
# release cannot silently tighten lints. Target is linux x86_64 with musl
# for our statically-linked artifact.

image: rust:1.80-slim

definitions:
  caches:
    cargo:
      key:
        files:
          - Cargo.lock
          - rust-toolchain.toml
      path: $CARGO_HOME

  steps:
    - step: &quality
        name: Quality gate (fmt, clippy, test)
        caches:
          - cargo
        script:
          - rustup component add rustfmt clippy
          - cargo fmt --all -- --check
          - cargo clippy --all-targets -- -D warnings
          - cargo test --all-targets

pipelines:
  default:
    - step: *quality

  branches:
    main:
      - step: *quality

  pull-requests:
    '**':
      - step: *quality
