# spyc CI — fmt, clippy, tests, supply-chain (cargo-deny), coverage,
# plus a scheduled dependency-drift report.
#
# We build against the pinned rust-toolchain.toml so a new stable Rust
# release cannot silently tighten lints. All cargo invocations use
# --locked (directly or via the Makefile) so a Cargo.lock drift in CI
# fails loudly instead of silently pulling fresh transitive deps.
#
# The `weekly-deps` custom pipeline runs `cargo deny check advisories`
# (fresh RUSTSEC DB) + `cargo outdated` + `cargo tree --duplicates`. It
# does NOT run on push — it's wired to a Bitbucket *schedule*. The
# schedule itself is configured in the repo UI (Repository settings →
# Pipelines → Schedules), pointing at `Custom: weekly-deps` on `main`.
# Bitbucket Cloud doesn't expose schedules in YAML; the pipeline name
# and the UI schedule are the contract. Failures from this pipeline
# light up the existing Bitbucket → Slack integration the same way a
# branch-build failure does.

# Non-slim image — bakes in `make`, `git`, `curl`, `ca-certificates`,
# `tar`, AND a C toolchain (gcc/`cc` via build-essential), so we don't
# apt-install on every run (~13s saved). The pull is bigger but Bitbucket
# caches the image per-runner.
#
# The C compiler is load-bearing: spyc links compiled-C deps — `zstd-sys`
# (libzstd) and `mlua-sys` (vendored Lua 5.4) — so a `rust:*-slim` image
# (no build-essential) would break the build. The `cc --version` guard at
# the top of the quality step fails loudly if a future image swap drops it.
image: rust:1.85

definitions:
  caches:
    # All four caches include `.ci-cache-version` in their key files.
    # Bitbucket caches are immutable per key — once a cache is uploaded
    # for a given key, subsequent runs *never* upload over it
    # ("Skipping upload for existing cache" in the logs), so newly-
    # added crates and target artifacts never make it into the cache.
    # Bumping the integer in `.ci-cache-version` changes the derived
    # key, forcing Bitbucket to upload a fresh cache on the next run.
    # Use sparingly — once after a major dep addition, or when the
    # warm-cache build is still suspiciously slow.

    # `cargo` covers $CARGO_HOME — registry index, downloaded crates,
    # and installed binaries (cargo-deny / cargo-llvm-cov). Keyed on
    # the toolchain only so a Cargo.lock change (e.g. a patch version
    # bump that rewrites the lockfile's `name = "spyc"` line) does
    # NOT bust this cache. Stale registry entries are harmless;
    # missing/outdated ones just trigger a re-fetch on demand.
    cargo:
      key:
        files:
          - rust-toolchain.toml
          - .ci-cache-version
      path: $CARGO_HOME
    # `target` keyed on toolchain only — same as `cargo`. cargo's
    # per-crate fingerprint hashes each crate's actual inputs (source,
    # build-script outputs, feature flags), so restoring a stale
    # target/ against a different Cargo.lock is *safe*: changed deps
    # recompile fresh, unchanged deps reuse from cache. Previously we
    # keyed on Cargo.lock too, which sounded conservative but in
    # practice meant every patch version bump (which rewrites the
    # lockfile's `name = "spyc" version = ...` line) busted the cache
    # and forced a ~3min recompile of the whole dep graph even though
    # nothing in the graph actually changed.
    target:
      key:
        files:
          - rust-toolchain.toml
          - .ci-cache-version
      path: target
    # Coverage-instrumented target dir. Quality and Coverage emit
    # binary-incompatible artifacts (`cargo llvm-cov` injects
    # `-C instrument-coverage` RUSTFLAGS), so they cannot share
    # `target/`: whichever step's upload landed last clobbered the
    # other and forced a from-scratch rebuild on the next run.
    # Coverage now writes to `target-cov/` (via `--target-dir`) and
    # caches it under its own key.
    target-cov:
      key:
        files:
          - rust-toolchain.toml
          - .ci-cache-version
      path: target-cov
    # `rustup` covers $RUSTUP_HOME — toolchain binaries plus added
    # components (rustfmt / clippy / llvm-tools-preview). `rustup
    # component add` is idempotent, so on a warm cache it's a no-op
    # instead of the ~44s download + extract. Keyed on
    # rust-toolchain.toml since a toolchain bump is the only thing
    # that can invalidate this directory.
    rustup:
      key:
        files:
          - rust-toolchain.toml
          - .ci-cache-version
      path: $RUSTUP_HOME

  steps:
    - step: &quality
        name: Quality gate (make check)
        caches:
          - cargo
          - target
          - rustup
        script:
          # Guard: spyc links compiled-C deps (zstd-sys/libzstd,
          # mlua-sys/vendored Lua), so the image MUST carry a C compiler.
          # Fail loudly here rather than deep in a `*-sys` build script if a
          # future image swap (e.g. to `rust:*-slim`) drops build-essential.
          - cc --version
          # `make`, `git`, `curl`, `ca-certificates` all come from the
          # non-slim image. We add rustfmt + clippy components and
          # cargo-deny. cargo-deny covers what cargo-audit used to
          # (advisories) plus licenses, sources, and bans — ignores
          # live in deny.toml with documented reasons.
          - rustup component add rustfmt clippy
          # cargo-deny: prebuilt binary from the upstream GitHub
          # release, verified against the project's own published
          # `.sha256`. Replaces `cargo install cargo-deny --locked`
          # which spent ~3 min compiling from source on every cold
          # cache. Bump the VERSION + SHA256 pair together when
          # EmbarkStudios ships a new release; the sha file lives at
          # the same release URL with `.sha256` appended.
          - |
            CARGO_DENY_VERSION=0.19.4
            CARGO_DENY_SHA256=3bd58b784e83715b86ddbc9deac591890372ec77fda5741bb0826970b958506f
            CARGO_DENY_DIR=cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl
            if ! "$CARGO_HOME/bin/cargo-deny" --version 2>/dev/null | grep -q "${CARGO_DENY_VERSION}"; then
              curl -sSLo /tmp/cargo-deny.tar.gz "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/${CARGO_DENY_DIR}.tar.gz"
              echo "${CARGO_DENY_SHA256}  /tmp/cargo-deny.tar.gz" | sha256sum -c -
              tar -xzf /tmp/cargo-deny.tar.gz -C /tmp
              install -m 0755 "/tmp/${CARGO_DENY_DIR}/cargo-deny" "$CARGO_HOME/bin/cargo-deny"
            fi
          # `make check` = fmt-check + clippy + tests + deny. CI calls the
          # Makefile so local and CI agree on the gate. (The suite runs
          # with default test parallelism — it's chdir-free, so the
          # parallel runner is safe; there is no --test-threads=1.)
          #
          # Two CI-only env overrides (local dev is unaffected):
          #
          # `CARGO_INCREMENTAL=0` disables cargo's per-crate incremental
          # metadata. The metadata files include build paths and
          # timestamps that go stale across runners, which makes warm-
          # cache hits silently rebuild artifacts that should have been
          # reusable. Disabling it shrinks target/ AND makes the cached
          # dep graph deterministic across runs.
          #
          # `CARGO_PROFILE_{DEV,TEST}_DEBUG=line-tables-only` drops full
          # DWARF from the clippy + test compiles. clippy (check-mode) and
          # test (codegen-mode) each compile spyc's large crate separately
          # — cargo can't share those artifacts — so the debug info is
          # generated twice. CI never runs a debugger on these builds;
          # line tables keep panic file:line in test failures while cutting
          # compile time and shrinking target/ (which also speeds the
          # Bitbucket cache push/pull).
          - CARGO_INCREMENTAL=0 CARGO_PROFILE_DEV_DEBUG=line-tables-only CARGO_PROFILE_TEST_DEBUG=line-tables-only make check

    - step: &deps-status
        name: Dependency drift report
        caches:
          - cargo
          - target
          - rustup
        script:
          # Same cargo-deny install dance as the Quality step. Pinned
          # binary, verified by sha256. Bump VERSION + SHA256 together
          # when EmbarkStudios ships a new release.
          - |
            CARGO_DENY_VERSION=0.19.4
            CARGO_DENY_SHA256=3bd58b784e83715b86ddbc9deac591890372ec77fda5741bb0826970b958506f
            CARGO_DENY_DIR=cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl
            if ! "$CARGO_HOME/bin/cargo-deny" --version 2>/dev/null | grep -q "${CARGO_DENY_VERSION}"; then
              curl -sSLo /tmp/cargo-deny.tar.gz "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/${CARGO_DENY_DIR}.tar.gz"
              echo "${CARGO_DENY_SHA256}  /tmp/cargo-deny.tar.gz" | sha256sum -c -
              tar -xzf /tmp/cargo-deny.tar.gz -C /tmp
              install -m 0755 "/tmp/${CARGO_DENY_DIR}/cargo-deny" "$CARGO_HOME/bin/cargo-deny"
            fi
          # cargo-outdated installs from source the first run (~1 min);
          # subsequent runs hit the cargo cache and the binary in
          # $CARGO_HOME/bin is reused. --locked keeps it deterministic.
          - cargo install cargo-outdated --locked
          # Hard fail on security advisories. cargo-deny re-fetches the
          # RUSTSEC DB on every run so this picks up new advisories
          # against existing deps even on weeks where we shipped no
          # commits. Quality-gate runs on PRs cover the push path;
          # this run covers the gap.
          - cargo deny check advisories
          # Soft signal — outdated direct deps. `|| true` keeps the
          # build green: we want the report visible in the log
          # (forwarded to Slack via the existing build notification),
          # not a red build that trains us to ignore it.
          - cargo outdated --root-deps-only || true
          # Same shape — diamond dependencies often indicate transitive
          # crates drifting independently. Informational.
          - cargo tree --duplicates || true

    - step: &coverage
        name: Coverage (ratcheting floor)
        caches:
          - cargo
          - target-cov
          - rustup
        script:
          - rustup component add llvm-tools-preview
          # cargo-llvm-cov: pinned prebuilt binary from the upstream
          # GitHub release, verified by sha256 — mirrors the cargo-deny
          # install in the Quality step. Replaces `cargo install
          # cargo-llvm-cov --locked`, which compiled from source (minutes)
          # on every cold cache. Bump VERSION + SHA256 together when
          # taiki-e ships a new release (sha = sha256 of the
          # x86_64-unknown-linux-musl .tar.gz; the binary sits at its root).
          - |
            CARGO_LLVM_COV_VERSION=0.8.7
            CARGO_LLVM_COV_SHA256=967b5cc996c29d8baa52bbb4595ef1f53af35255af8e2036ddbc6468d7b523c7
            # `--version` may need the `llvm-cov` subcommand depending on the
            # build, so try both forms before deciding to (re)install.
            if ! { "$CARGO_HOME/bin/cargo-llvm-cov" --version 2>/dev/null || "$CARGO_HOME/bin/cargo-llvm-cov" llvm-cov --version 2>/dev/null; } | grep -q "${CARGO_LLVM_COV_VERSION}"; then
              curl -sSLo /tmp/cargo-llvm-cov.tar.gz "https://github.com/taiki-e/cargo-llvm-cov/releases/download/v${CARGO_LLVM_COV_VERSION}/cargo-llvm-cov-x86_64-unknown-linux-musl.tar.gz"
              echo "${CARGO_LLVM_COV_SHA256}  /tmp/cargo-llvm-cov.tar.gz" | sha256sum -c -
              tar -xzf /tmp/cargo-llvm-cov.tar.gz -C /tmp
              install -m 0755 /tmp/cargo-llvm-cov "$CARGO_HOME/bin/cargo-llvm-cov"
            fi
          # `CARGO_TARGET_DIR=target-cov` keeps the instrumented build
          # out of the Quality step's `target/` cache. See the
          # `target-cov` cache definition above for the why.
          # (`cargo llvm-cov` itself doesn't accept `--target-dir`;
          # the env var is the documented escape hatch.)
          #
          # `CARGO_INCREMENTAL=0` mirrors the Quality step — disables
          # the stale-across-runners incremental metadata so warm
          # cache hits actually reuse compiled artifacts.
          - CARGO_TARGET_DIR=target-cov CARGO_INCREMENTAL=0 cargo llvm-cov --locked --all-targets --fail-under-lines 35

pipelines:
  # No `default:` block. With both `default` and `pull-requests`
  # active, every push to a feature branch with an open PR fired
  # *two* identical pipelines in parallel — one matched by the
  # catch-all `default`, one by `pull-requests`. Dropping `default`
  # leaves a clean three-state model:
  #   - branch push, no PR    → no CI (open the PR for feedback)
  #   - branch push, PR open  → `pull-requests` runs once
  #   - merge to main         → `branches.main` runs (parallel
  #                              quality + coverage gate)
  branches:
    main:
      - parallel:
          - step: *quality
          - step: *coverage

  pull-requests:
    '**':
      - parallel:
          - step: *quality
          - step: *coverage

  custom:
    # Triggered by the Bitbucket UI schedule "Weekly deps drift" on
    # `main` (configured at Repository settings → Pipelines → Schedules).
    # Surfaces RUSTSEC advisories that landed between commits, plus a
    # `cargo outdated` report on direct deps. See the file header for
    # the full why.
    weekly-deps:
      - step: *deps-status
