# spyc CI — runs formatting, clippy, tests, audit, and coverage on every push.
#
# We build against the pinned rust-toolchain.toml so that a new stable Rust
# release cannot silently tighten lints. Target is linux x86_64 with musl
# for our statically-linked artifact.

image: rust:1.85-slim

definitions:
  caches:
    cargo:
      key:
        files:
          - Cargo.lock
          - rust-toolchain.toml
      path: $CARGO_HOME
    target:
      key:
        files:
          - Cargo.lock
          - rust-toolchain.toml
      path: target

  steps:
    - step: &quality
        name: Quality gate (make check + audit)
        caches:
          - cargo
          - target
        script:
          # The slim image is a debian-slim minus dev tooling. We need
          # `make` (for the canonical `make check` target), rustfmt
          # and clippy components, and cargo-audit.
          - apt-get update && apt-get install -y --no-install-recommends make
          - rustup component add rustfmt clippy
          - cargo install cargo-audit --locked
          # `make check` runs fmt-check + clippy + tests. Tests are
          # forced single-threaded inside the Makefile because two
          # state-module tests mutate XDG_STATE_HOME and race when
          # parallel. CI calls the Makefile so local and CI agree
          # exactly on the gate.
          - make check
          # RUSTSEC-2026-0009: time 0.3.45 DoS — fix needs Rust 1.88, our MSRV is 1.85.
          # Not exploitable: transitive via syntect→plist, no user time parsing.
          - cargo audit --ignore RUSTSEC-2026-0009

    - step: &coverage
        name: Coverage (ratcheting floor)
        caches:
          - cargo
          - target
        script:
          - rustup component add llvm-tools-preview
          - cargo install cargo-llvm-cov --locked
          - cargo llvm-cov --all-targets --fail-under-lines 35

pipelines:
  default:
    - step: *quality

  branches:
    main:
      - parallel:
          - step: *quality
          - step: *coverage

  pull-requests:
    '**':
      - parallel:
          - step: *quality
          - step: *coverage
