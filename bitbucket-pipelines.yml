# spyc CI — fmt, clippy, tests, supply-chain (cargo-deny), coverage.
#
# We build against the pinned rust-toolchain.toml so a new stable Rust
# release cannot silently tighten lints. All cargo invocations use
# --locked (directly or via the Makefile) so a Cargo.lock drift in CI
# fails loudly instead of silently pulling fresh transitive deps.

image: rust:1.85-slim

definitions:
  caches:
    cargo:
      key:
        files:
          - Cargo.lock
          - rust-toolchain.toml
      path: $CARGO_HOME
    target:
      key:
        files:
          - Cargo.lock
          - rust-toolchain.toml
      path: target

  steps:
    - step: &quality
        name: Quality gate (make check)
        caches:
          - cargo
          - target
        script:
          # The slim image lacks dev tooling. We need `make` (canonical
          # gate), `git` (cargo-deny clones the RustSec advisory DB),
          # rustfmt + clippy components, and cargo-deny itself.
          # cargo-deny covers what cargo-audit used to (advisories)
          # plus licenses, sources, and bans — ignores live in
          # deny.toml with documented reasons.
          - apt-get update && apt-get install -y --no-install-recommends make git
          - rustup component add rustfmt clippy
          - cargo install cargo-deny --locked
          # `make check` = fmt-check + clippy + tests + deny. Tests
          # forced single-threaded by the Makefile (XDG_STATE_HOME race).
          # CI calls the Makefile so local and CI agree on the gate.
          - make check

    - step: &coverage
        name: Coverage (ratcheting floor)
        caches:
          - cargo
          - target
        script:
          - rustup component add llvm-tools-preview
          - cargo install cargo-llvm-cov --locked
          - cargo llvm-cov --locked --all-targets --fail-under-lines 35

pipelines:
  default:
    - step: *quality

  branches:
    main:
      - parallel:
          - step: *quality
          - step: *coverage

  pull-requests:
    '**':
      - parallel:
          - step: *quality
          - step: *coverage
