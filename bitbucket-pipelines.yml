# spyc CI — fmt, clippy, tests, supply-chain (cargo-deny), coverage.
#
# We build against the pinned rust-toolchain.toml so a new stable Rust
# release cannot silently tighten lints. All cargo invocations use
# --locked (directly or via the Makefile) so a Cargo.lock drift in CI
# fails loudly instead of silently pulling fresh transitive deps.

# Non-slim image — bakes in `make`, `git`, `curl`, `ca-certificates`,
# `tar`, etc., so we don't apt-install on every run (~13s saved). The
# pull is bigger but Bitbucket caches the image per-runner.
image: rust:1.85

definitions:
  caches:
    # `cargo` covers $CARGO_HOME — registry index, downloaded crates,
    # and installed binaries (cargo-deny / cargo-llvm-cov). Keyed on
    # the toolchain only so a Cargo.lock change (e.g. a patch version
    # bump that rewrites the lockfile's `name = "spyc"` line) does
    # NOT bust this cache. Stale registry entries are harmless;
    # missing/outdated ones just trigger a re-fetch on demand.
    cargo:
      key:
        files:
          - rust-toolchain.toml
      path: $CARGO_HOME
    # `target` keyed on toolchain only — same as `cargo`. cargo's
    # per-crate fingerprint hashes each crate's actual inputs (source,
    # build-script outputs, feature flags), so restoring a stale
    # target/ against a different Cargo.lock is *safe*: changed deps
    # recompile fresh, unchanged deps reuse from cache. Previously we
    # keyed on Cargo.lock too, which sounded conservative but in
    # practice meant every patch version bump (which rewrites the
    # lockfile's `name = "spyc" version = ...` line) busted the cache
    # and forced a ~3min recompile of the whole dep graph even though
    # nothing in the graph actually changed.
    target:
      key:
        files:
          - rust-toolchain.toml
      path: target
    # `rustup` covers $RUSTUP_HOME — toolchain binaries plus added
    # components (rustfmt / clippy / llvm-tools-preview). `rustup
    # component add` is idempotent, so on a warm cache it's a no-op
    # instead of the ~44s download + extract. Keyed on
    # rust-toolchain.toml since a toolchain bump is the only thing
    # that can invalidate this directory.
    rustup:
      key:
        files:
          - rust-toolchain.toml
      path: $RUSTUP_HOME

  steps:
    - step: &quality
        name: Quality gate (make check)
        caches:
          - cargo
          - target
          - rustup
        script:
          # `make`, `git`, `curl`, `ca-certificates` all come from the
          # non-slim image. We add rustfmt + clippy components and
          # cargo-deny. cargo-deny covers what cargo-audit used to
          # (advisories) plus licenses, sources, and bans — ignores
          # live in deny.toml with documented reasons.
          - rustup component add rustfmt clippy
          # cargo-deny: prebuilt binary from the upstream GitHub
          # release, verified against the project's own published
          # `.sha256`. Replaces `cargo install cargo-deny --locked`
          # which spent ~3 min compiling from source on every cold
          # cache. Bump the VERSION + SHA256 pair together when
          # EmbarkStudios ships a new release; the sha file lives at
          # the same release URL with `.sha256` appended.
          - |
            CARGO_DENY_VERSION=0.19.4
            CARGO_DENY_SHA256=3bd58b784e83715b86ddbc9deac591890372ec77fda5741bb0826970b958506f
            CARGO_DENY_DIR=cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl
            if ! "$CARGO_HOME/bin/cargo-deny" --version 2>/dev/null | grep -q "${CARGO_DENY_VERSION}"; then
              curl -sSLo /tmp/cargo-deny.tar.gz "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/${CARGO_DENY_DIR}.tar.gz"
              echo "${CARGO_DENY_SHA256}  /tmp/cargo-deny.tar.gz" | sha256sum -c -
              tar -xzf /tmp/cargo-deny.tar.gz -C /tmp
              install -m 0755 "/tmp/${CARGO_DENY_DIR}/cargo-deny" "$CARGO_HOME/bin/cargo-deny"
            fi
          # `make check` = fmt-check + clippy + tests + deny. Tests
          # forced single-threaded by the Makefile (XDG_STATE_HOME race).
          # CI calls the Makefile so local and CI agree on the gate.
          - make check

    - step: &coverage
        name: Coverage (ratcheting floor)
        caches:
          - cargo
          - target
          - rustup
        script:
          - rustup component add llvm-tools-preview
          - cargo install cargo-llvm-cov --locked
          - cargo llvm-cov --locked --all-targets --fail-under-lines 35

pipelines:
  # No `default:` block. With both `default` and `pull-requests`
  # active, every push to a feature branch with an open PR fired
  # *two* identical pipelines in parallel — one matched by the
  # catch-all `default`, one by `pull-requests`. Dropping `default`
  # leaves a clean three-state model:
  #   - branch push, no PR    → no CI (open the PR for feedback)
  #   - branch push, PR open  → `pull-requests` runs once
  #   - merge to main         → `branches.main` runs (parallel
  #                              quality + coverage gate)
  branches:
    main:
      - parallel:
          - step: *quality
          - step: *coverage

  pull-requests:
    '**':
      - parallel:
          - step: *quality
          - step: *coverage
