[package]
name = "cspy"
version = "0.1.0"
edition = "2021"
description = "A vi-keyboard-driven file commander that pairs with Claude Code, inspired by SideFX's spy"
license = "MIT OR Apache-2.0"
repository = "https://github.com/tripstack/cspy"
rust-version = "1.80"

[[bin]]
name = "cspy"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
anyhow = "1"
thiserror = "1"
glob = "0.3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"

[profile.release-static]
inherits = "release"
